<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RunLog Auth</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #e8e8e8; padding: 40px; max-width: 700px; margin: 0 auto; }
    h1 { font-weight: 600; letter-spacing: -0.02em; }
    code { background: #1f1f1f; padding: 2px 6px; border-radius: 4px; font-size: 14px; }
    .muted { color: #888; }
  </style>
</head>
<body>
  <h1>RunLog Auth</h1>
  <p class="muted">OAuth broker for the RunLog PWA. Nothing to see here.</p>
  <p><code>GET /api/health</code> &mdash; sanity check</p>
  <p><code>POST /api/oauth-exchange</code> &mdash; swap auth code for tokens</p>
  <p><code>POST /api/refresh</code> &mdash; refresh an access token</p>
</body>
</html>
